<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎣 即时钓鱼</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' font-size='80' text-anchor='middle' dy='.3em'%3E🎣%3C/text%3E%3C/svg%3E"></link>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #1E90FF 60%, #105ea8 100%);
        }
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* ========== 上半部分 Canvas 钓鱼场景 ========== */
        .canvas-container {
            flex: 1;
            position: relative;
            min-height: 60%;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* ========== 下半部分 UI ========== */
        .ui-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            flex-shrink: 0;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
        }
        /* 蓄力条 */
        .power-container {
            margin-bottom: 10px;
        }
        .power-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .power-bar-bg {
            width: 100%;
            height: 24px;
            background: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
        }
        .power-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #FFC107 50%, #F44336 100%);
            width: 0%;
            transition: width 0.05s linear;
        }
        /* 操作按钮 */
        .action-btn-container {
            text-align: center;
            margin-bottom: 10px;
        }
        #actionBtn {
            width: 80%;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #FF9800 0%, #FF5722 100%);
            color: white;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
            cursor: pointer;
            transition: all 0.2s;
        }
        #actionBtn:active:not(:disabled) {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(255, 87, 34, 0.4);
        }
        #actionBtn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
        /* 信息行 */
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .info-item {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .info-label {
            color: #666;
        }
        .info-value {
            font-weight: bold;
            color: #333;
            float: right;
        }
        /* 底部标签页 */
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-top: 5px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            border-radius: 8px 8px 0 0;
        }
        .tab.active {
            color: #FF5722;
            background: #fff3e0;
            font-weight: bold;
        }
        /* 面板内容 */
        .tab-content {
            display: none;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px 0;
        }
        .tab-content.active {
            display: block;
        }
        /* 钓点列表 */
        .location-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .location-info {
            flex: 1;
        }
        .location-name {
            font-weight: bold;
            color: #333;
        }
        .location-desc {
            font-size: 12px;
            color: #666;
        }
        .location-unlock {
            background: #4CAF50;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .location-unlock:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .location-active {
            border: 2px solid #FF5722;
        }
        /* 鱼饵选择 */
        .bait-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .bait-item {
            padding: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .bait-item.active {
            border-color: #FF5722;
            background: #fff3e0;
        }
        .bait-name {
            font-weight: bold;
            font-size: 14px;
        }
        .bait-desc {
            font-size: 12px;
            color: #666;
        }
        /* 图鉴 */
        .fish-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .fish-item {
            padding: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            opacity: 0.3;
        }
        .fish-item.caught {
            opacity: 1;
        }
        .fish-name {
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .fish-rarity-common { color: #4CAF50; }
        .fish-rarity-rare { color: #2196F3; }
        .fish-rarity-epic { color: #9C27B0; }
        .fish-rarity-legendary { color: #FFC107; }
        .fish-max {
            font-size: 12px;
            color: #666;
        }
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
        }
        .modal.show {
            display: block;
        }
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 400px;
            text-align: center;
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .modal-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        .modal-btn {
            padding: 12px 30px;
            background: #FF5722;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }
        /* 浮动通知 */
        .toast {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        /* 稀有度标签颜色 */
        .rarity-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            color: white;
        }
        .rarity-common { background: #4CAF50; }
        .rarity-rare { background: #2196F3; }
        .rarity-epic { background: #9C27B0; }
        .rarity-legendary { background: #FFC107; color: #333; }
        /* 设置面板 */
        .settings-container {
            padding: 10px 0;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .reset-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="ui-container">
            <div class="power-container" id="powerContainer">
                <div class="power-label">
                    <span>蓄力</span>
                    <span id="powerText">0%</span>
                </div>
                <div class="power-bar-bg">
                    <div id="powerBar" class="power-bar-fill"></div>
                </div>
            </div>
            <div class="action-btn-container">
                <button id="actionBtn">长按抛竿</button>
            </div>
            <div class="info-row">
                <div class="info-item">
                    <span class="info-label">当前钓点</span>
                    <span class="info-value" id="currentLocation">池塘</span>
                </div>
                <div class="info-item">
                    <span class="info-label">金币</span>
                    <span class="info-value" id="goldText">0</span>
                </div>
            </div>
            <div class="info-row">
                <div class="info-item">
                    <span class="info-label">鱼竿</span>
                    <span class="info-value" id="rodInfo">竹竿 Lv.1</span>
                </div>
                <div class="info-item">
                    <span class="info-label">鱼饵</span>
                    <span class="info-value" id="baitInfo">蚯蚓</span>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="game.switchTab('locations')">钓点</div>
                <div class="tab" onclick="game.switchTab('baits')">鱼饵</div>
                <div class="tab" onclick="game.switchTab('book')">图鉴</div>
                <div class="tab" onclick="game.switchTab('settings')">设置</div>
            </div>
            <div id="locations" class="tab-content active">
                <!-- JS 渲染 -->
            </div>
            <div id="baits" class="tab-content">
                <!-- JS 渲染 -->
            </div>
            <div id="book" class="tab-content">
                <!-- JS 渲染 -->
            </div>
            <div id="settings" class="tab-content">
                <!-- JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="resultModal" class="modal" onclick="if (event.target == this) game.hideResultModal();">
        <div class="modal-content">
            <h2 class="modal-title" id="resultTitle">钓到了！</h2>
            <div class="modal-text" id="resultContent"></div>
            <button class="modal-btn" onclick="game.hideResultModal()">继续</button>
        </div>
    </div>

    <!-- 浮动通知 -->
    <div id="toast" class="toast"></div>

    <script src="game.js"></script>
    <script>
        window.addEventListener('load', function() {
            game.init();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向僵尸开炮 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.8rem;
            color: #00d4ff;
        }

        .ui-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFD700;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: linear-gradient(#0d1b2a, #1b263b);
        }

        /* 瞄准线 */
        .aim-container {
            margin-top: 10px;
            text-align: center;
        }

        .aim-instruction {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .power-bar {
            width: 100%;
            max-width: 800px;
            height: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #FF9800 50%, #f44336 100%);
            width: 0%;
            transition: width 0.1s;
        }

        .fire-btn {
            margin-top: 10px;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #f44336 0%, #ff5722 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .fire-btn:hover {
            transform: scale(1.05);
        }

        .fire-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 技能选择弹窗 */
        .skill-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .skill-modal.show {
            display: flex;
        }

        .skill-content {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            border: 2px solid #00d4ff;
        }

        .skill-content h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #00d4ff;
        }

        .skill-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 500px) {
            .skill-options {
                grid-template-columns: 1fr;
            }
        }

        .skill-option {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .skill-option:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .skill-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #FFD700;
        }

        .skill-desc {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .skill-rarity {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        .rarity-common { background: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .rarity-rare { background: rgba(33, 150, 243, 0.3); color: #2196F3; }
        .rarity-epic { background: rgba(156, 39, 176, 0.3); color: #9c27b0; }
        .rarity-legendary { background: rgba(255, 193, 7, 0.3); color: #FFC107; }

        /* 技能栏 */
        .skills-bar {
            margin-top: 10px;
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
        }

        .skills-bar h4 {
            margin-bottom: 8px;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .skill-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        /* 游戏结束 */
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .game-over-modal.show {
            display: flex;
        }

        .game-over-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #f44336;
        }

        .game-over-content h2 {
            color: #f44336;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1.1rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>💥 向僵尸开炮</h1>

    <div class="ui-bar">
        <div class="stat">
            <div class="stat-value" id="wave">1</div>
            <div class="stat-label">波次</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="hp">10</div>
            <div class="stat-label">基地血量</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="skill-orbs">0</div>
            <div class="stat-label">技能球</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="700"></canvas>

    </div>

    <div class="aim-container">
        <div class="aim-instruction">拖动瞄准 → 按住蓄力 → 松开开火</div>
        <div class="power-bar">
            <div class="power-fill" id="power-fill"></div>
        </div>
    </div>

    <div class="skills-bar">
        <h4>当前技能:</h4>
        <div id="skills-list" class="skills-list"></div>
    </div>

    <!-- 技能选择弹窗 -->
    <div id="skill-modal" class="skill-modal">
        <div class="skill-content">
            <h2>选择一个技能</h2>
            <div id="skill-options" class="skill-options"></div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div id="game-over-modal" class="game-over-modal">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <p>你坚持到了第 <span id="final-wave">1</span> 波</p>
            <p>总共击杀了 <span id="total-kills">0</span> 只僵尸</p>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        game.init();
    </script>
</body>
</html>

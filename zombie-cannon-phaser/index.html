<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向僵尸开炮 - Phaser 版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 1.8rem;
            color: #00d4ff;
            text-shadow: 2px 2px 0 #000;
        }

        .version-info {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .ui-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFD700;
        }

        .exp-bar-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exp-bar {
            flex: 1;
            height: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
            margin: 0 10px;
        }

        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 100%);
            transition: width 0.3s;
        }

        .cooldown-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cooldown-bar {
            flex: 1;
            height: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
            margin: 0 10px;
        }

        .cooldown-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #0099cc 100%);
            transition: width 0.1s;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 5px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .controls {
            margin-top: 10px;
            text-align: center;
        }

        .restart-btn {
            padding: 10px 30px;
            font-size: 1.1rem;
            background: linear-gradient(90deg, #f44336 0%, #d32f2f 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .hint {
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* 技能选择弹窗 */
        .skill-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .skill-modal.show {
            display: flex;
        }

        .skill-content {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            border: 2px solid #00d4ff;
        }

        .skill-content h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #00d4ff;
        }

        .skill-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 500px) {
            .skill-options {
                grid-template-columns: 1fr;
            }
        }

        .skill-option {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .skill-option:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .skill-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #FFD700;
        }

        .skill-desc {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .skill-rarity {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        .rarity-common { background: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .rarity-rare { background: rgba(33, 150, 243, 0.3); color: #2196F3; }
        .rarity-epic { background: rgba(156, 39, 176, 0.3); color: #9c27b0; }
        .rarity-legendary { background: rgba(255, 193, 7, 0.3); color: #FFC107; }

        /* 游戏结束弹窗 */
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .game-over-modal.show {
            display: flex;
        }

        .game-over-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #f44336;
        }

        .game-over-content h2 {
            color: #f44336;
            font-size: 2rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>💥 向僵尸开炮</h1>
    <div class="version-info">Version: 1.0.0 - Phaser Edition - Updated: 2026-03-27 00:20 (GMT+8)</div>

    <div class="ui-bar">
        <div class="stat">
            <div class="stat-label">等级</div>
            <div class="stat-value" id="playerLevel">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">波次</div>
            <div class="stat-value" id="wave">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">基地血量</div>
            <div class="stat-value" id="hp">10</div>
        </div>
        <div class="stat">
            <div class="stat-label">技能球</div>
            <div class="stat-value" id="skillOrbs">0</div>
        </div>
    </div>

    <div class="exp-bar-container">
        <span style="font-size: 0.8rem; opacity: 0.7;">exp</span>
        <div class="exp-bar">
            <div class="exp-fill" id="exp-fill" style="width: 0%;"></div>
        </div>
        <span style="font-size: 0.8rem; opacity: 0.7;"><span id="exp-text">0/10</span></span>
    </div>

    <div class="cooldown-container">
        <span style="font-size: 0.8rem; opacity: 0.7;">CD</span>
        <div class="cooldown-bar">
            <div class="cooldown-fill" id="cooldown-fill" style="width: 100%;"></div>
        </div>
        <span style="font-size: 0.8rem; opacity: 0.7;"></span>
    </div>

    <div id="game-container">
        <div id="game-canvas"></div>
    </div>

    <div class="controls">
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>

    <div class="hint">
        自动射击，捡技能球/升级三选一选技能 💣
    </div>

    <!-- 技能选择弹窗 -->
    <div id="skill-modal" class="skill-modal">
        <div class="skill-content">
            <h2>升级！选择一个技能</h2>
            <div id="skill-options" class="skill-options"></div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div id="game-over-modal" class="game-over-modal">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <p>你坚持到了第 <span id="final-wave">1</span> 波</p>
            <p>总共击杀了 <span id="total-kills">0</span> 只僵尸</p>
            <button class="restart-btn" onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="game.js"></script>
    <script>
        let game;

        function restartGame() {
            if (game) {
                game.destroy(true);
            }
            game = new ZombieCannonGame();
            updateUI();
        }

        function updateUI() {
            if (!game) return;
            document.getElementById('playerLevel').textContent = game.gameState.playerLevel;
            document.getElementById('wave').textContent = game.gameState.wave;
            document.getElementById('hp').textContent = Math.max(0, Math.floor(game.gameState.baseHp));
            document.getElementById('skillOrbs').textContent = game.gameState.skillOrbs;
            document.getElementById('exp-text').textContent = `${Math.floor(game.gameState.exp)}/${game.gameState.expToNext}`;
            document.getElementById('exp-fill').style.width = (game.gameState.exp / game.gameState.expToNext * 100) + '%';
        }

        function updateCooldown(pct) {
            document.getElementById('cooldown-fill').style.width = pct + '%';
        }

        window.onload = () => {
            game = new ZombieCannonGame();
            updateUI();
        };
    </script>
</body>
</html>

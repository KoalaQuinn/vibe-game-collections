<!DOCTYPE html>
<html>
<head>
    <title>贪吃蛇 - 纯JS版</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            margin-bottom: 20px;
            color: #4CAF50;
        }
        #game-container {
            border: 2px solid #4CAF50;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }
        canvas {
            display: block;
            background: #111;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            max-width: 500px;
        }
        .controls h3 {
            color: #4CAF50;
            margin-bottom: 10px;
        }
        .controls p {
            margin: 5px 0;
            opacity: 0.8;
        }
        .score {
            font-size: 24px;
            margin-bottom: 10px;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇游戏</h1>
    
    <div class="score">得分: <span id="score">0</span></div>
    <div id="game-container">
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>
    
    <div class="controls">
        <h3>操作说明</h3>
        <p>⬆️⬇️⬅️➡️ 方向键控制蛇的移动</p>
        <p>⏸️ 空格键暂停/继续游戏</p>
        <p>🔄 R键重新开始游戏</p>
        <p>🎯 吃到红色食物得分+1，速度会逐渐变快</p>
        <p>❌ 撞墙或撞到自己身体游戏结束</p>
    </div>

    <script>
        // 游戏配置
        const gridSize = 20;
        const gridCount = 25;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // 游戏状态
        let snake = [];
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let food = {};
        let score = 0;
        let gameOver = false;
        let paused = false;
        let moveTimer = 0;
        let moveSpeed = 150; // 移动间隔（毫秒）
        let lastTime = 0;

        // 初始化游戏
        function initGame() {
            snake = [
                {x: 12, y: 12},
                {x: 11, y: 12},
                {x: 10, y: 12}
            ];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameOver = false;
            paused = false;
            moveSpeed = 150;
            scoreElement.textContent = score;
            spawnFood();
            requestAnimationFrame(gameLoop);
        }

        // 生成食物
        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * gridCount);
                food.y = Math.floor(Math.random() * gridCount);
                valid = true;
                // 检查食物是否生成在蛇身上
                for (const segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        // 移动蛇
        function moveSnake() {
            if (gameOver || paused) return;

            // 更新方向
            direction = {...nextDirection};

            // 计算新头部位置
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // 检查撞墙
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                gameOver = true;
                alert(`游戏结束！得分: ${score}\n按确定重新开始`);
                initGame();
                return;
            }

            // 检查撞自己
            for (const segment of snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    gameOver = true;
                    alert(`游戏结束！得分: ${score}\n按确定重新开始`);
                    initGame();
                    return;
                }
            }

            // 插入新头部
            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.textContent = score;
                spawnFood();
                // 加快速度
                if (moveSpeed > 80) {
                    moveSpeed -= 5;
                }
            } else {
                // 移除尾部
                snake.pop();
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#66dd66'; // 头部更亮
                } else {
                    const brightness = 0.2 + (index / snake.length) * 0.3;
                    ctx.fillStyle = `rgb(${Math.floor(40 + brightness * 100)}, ${Math.floor(150 + brightness * 100)}, ${Math.floor(40 + brightness * 100)})`;
                }
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });

            // 绘制暂停提示
            if (paused && !gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2 - 15);
                ctx.font = '16px Arial';
                ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + 15);
            }
        }

        // 游戏循环
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;

            moveTimer += deltaTime;
            if (moveTimer >= moveSpeed) {
                moveTimer = 0;
                moveSnake();
            }

            draw();
            lastTime = timestamp;

            if (!gameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        // 键盘输入处理
        document.addEventListener('keydown', (e) => {
            if (!gameOver) {
                if (e.key === 'ArrowRight' && direction.x !== -1) {
                    nextDirection = {x: 1, y: 0};
                } else if (e.key === 'ArrowLeft' && direction.x !== 1) {
                    nextDirection = {x: -1, y: 0};
                } else if (e.key === 'ArrowUp' && direction.y !== 1) {
                    nextDirection = {x: 0, y: -1};
                } else if (e.key === 'ArrowDown' && direction.y !== -1) {
                    nextDirection = {x: 0, y: 1};
                }
            }

            // 暂停/继续
            if (e.key === ' ' && !gameOver) {
                paused = !paused;
                if (!paused) {
                    lastTime = 0;
                    moveTimer = 0;
                    requestAnimationFrame(gameLoop);
                }
                e.preventDefault();
            }

            // 重新开始
            if (e.key.toLowerCase() === 'r') {
                initGame();
            }
        });

        // 开始游戏
        initGame();
    </script>
</body>
</html>
